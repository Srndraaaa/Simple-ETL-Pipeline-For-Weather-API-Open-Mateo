services:
  postgres-etl:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-etl_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-etl_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  etl-main:
    build: .
    depends_on:
      postgres-etl:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres-etl
    command: ["python", "-m", "src.main"]
    restart: unless-stopped

  dashboard-etl:
    build: .
    depends_on:
      postgres-etl:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres-etl
    command: ["uvicorn", "src.dashboard_api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
